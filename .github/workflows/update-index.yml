name: Update Filter Index

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "filters/**"

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate index
        run: node scripts/generate-index.js
        env:
          GITHUB_REPO_OWNER: JaimELegor
          GITHUB_REPO_NAME: gargoyles-filters-test

      - name: Commit index
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add filters/index.json
          git commit -m "Auto-update filter index" || echo "No changes"
          git push
